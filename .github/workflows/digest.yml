# .github/workflows/digest.yml
# PURPOSE: The scheduler. GitHub Actions runs this for free.
# It wakes up at 6AM IST (00:30 UTC) every day, runs your agent, sleeps again.

name: AI Morning Digest

on:
  schedule:
    - cron: "30 0 * * *"  # 00:30 UTC = 6:00 AM IST, every single day
  workflow_dispatch:        # lets you click "Run Now" manually from GitHub UI

jobs:
  run-digest:
    runs-on: ubuntu-latest  # free Linux machine GitHub gives you

    steps:
      # Step 1: Download your code onto GitHub's machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Install your packages from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run the agent
      # Secrets are stored safely in GitHub — never in your code
      - name: Run AI Digest Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          DIGEST_EMAIL: ${{ secrets.DIGEST_EMAIL }}
        run: python agent/send_email.py